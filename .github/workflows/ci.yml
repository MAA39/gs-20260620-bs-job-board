name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.19.0
      - run: corepack enable
      - run: corepack prepare pnpm@9.15.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec turbo typecheck --output-logs=errors-only
      - run: pnpm exec turbo build --output-logs=errors-only
      - run: node --check scripts/probe-flue-stream.mjs
      - name: AI route guards
        run: |
          test -z "$(grep -R 'api.ai.sakura.ad.jp/v1/chat/completions' apps/api apps/agent/src/workflows --include='*.ts' || true)"
          test -z "$(grep -R 'reasoning_content' apps/api apps/agent/src/workflows --include='*.ts' || true)"
